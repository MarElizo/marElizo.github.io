# =============================================================================
# projects.yml — Single source of truth for research projects
# =============================================================================
# Fields:
#   name          : Full project name (required)
#   acronym       : Short identifier shown in badges (required)
#   funding_type  : european | national | regional | private (required)
#   role          : PI | researcher (required)
#   area          : List — any of: healthcare, navigation, communications,
#                   security, data (used for filtering)
#   url           : Project website
#   doi           : DOI URL for EU projects registered in CORDIS
#   year_start    : Integer (required)
#   year_end      : Integer — omit or null if ongoing
#   active        : true | false
#   partners      : Short description of consortium / partners (optional)
#   description   : One-sentence summary for industry-facing sections (optional)
# =============================================================================

# ── European projects ─────────────────────────────────────────────────────────

- name: "SYNTHIA: Synthetic data generation framework for integrated validation of use cases and AI healthcare applications"
  acronym: SYNTHIA
  funding_type: european
  role: PI
  area: [healthcare]
  url: "https://www.ihi.europa.eu/projects-results/project-factsheets/synthia"
  year_start: 2024
  year_end: 2029
  active: true
  description: "Development of synthetic data infrastructures to accelerate AI adoption in healthcare under the Innovative Health Initiative (IHI/EU)."

- name: "REPO4EU: Precision drug REPurpOsing For EUrope and the world"
  acronym: REPO4EU
  funding_type: european
  role: PI
  area: [healthcare]
  doi: "https://doi.org/10.3030/101057619"
  year_start: 2022
  year_end: 2029
  active: true
  description: "European platform for AI-driven drug repurposing combining knowledge graphs and machine learning across European health data."

