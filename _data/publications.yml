# =============================================================================
# publications.yml — Single source of truth for all publications
# =============================================================================
# Fields:
#   title       : Full title of the work (required)
#   authors     : Author string as it appears in citations (required)
#   year        : Publication year, integer (required)
#   type        : journal | conference | book | poster (required)
#   quartile    : Q1 | Q2  (journals only)
#   journal     : Journal name (journals/posters published in journals)
#   venue       : Conference or workshop name (conferences/book chapters)
#   impact_factor  : Numeric IF (journals only, year specified in metrics_year)
#   metrics_year   : Year of the IF/ranking data
#   metrics_detail : Full ranking string for display (optional)
#   doi         : Full DOI URL
#   scholar     : Google Scholar citation URL
#   pdf         : Relative path to PDF (e.g. ../files/2026-joe.pdf)
#   code        : GitHub or external code URL
#   note        : Short annotation (Spotlight, Poster abstract, etc.)
#   featured    : true | false  (flag for homepage highlights)
# =============================================================================

